name: niu_sat_app
description: NSAT - NIU Student Aptitude Test Portal
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  google_fonts: ^6.2.1
  csv: ^6.0.0
  path_provider: ^2.1.4
  share_plus: ^10.1.2

  # --- Firebase core (required) ---
  firebase_core: ^3.6.0

  # --- Firestore: students, tests, questions, results, attempts, otps ---
  cloud_firestore: ^5.4.4

  # --- Firebase Auth: holds the verified session after email OTP ---
  firebase_auth: ^5.3.1

  # --- Cloud Functions: NPF sync, fee-check, email-fetch, OTP ---
  cloud_functions: ^5.6.2

  # --- FCM: Tier-1 push notifications ---
  firebase_messaging: ^15.1.3

  # --- Crashlytics: crash reporting for exam day ---
  firebase_crashlytics: ^4.1.3

  # --- Remote Config: exam window toggle, maintenance mode ---
  firebase_remote_config: ^5.1.3
  firebase_analytics: ^11.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/icon/
flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#FFFFFF"
    theme_color: "#FFFFFF"
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
