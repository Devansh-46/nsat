name: niu_sat_app
description: NSAT - NIU Student Aptitude Test Portal
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  google_fonts: ^6.2.1
  csv: ^6.0.0
  path_provider: ^2.1.4
  share_plus: ^10.1.2

  # --- Firebase core (required) ---
  firebase_core: ^3.6.0

  # --- Firestore: students, tests, questions, results, attempts, otps ---
  cloud_firestore: ^5.4.4

  # --- Firebase Auth: holds the verified session after email OTP ---
  firebase_auth: ^5.3.1

  # --- Cloud Functions: NPF sync, fee-check, email-fetch, OTP ---
  cloud_functions: ^5.1.3

  # --- FCM: Tier-1 push notifications ---
  firebase_messaging: ^15.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
